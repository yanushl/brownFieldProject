# GitHub Actions - Salesforce CI/CD Pipeline Template
# Place in: .github/workflows/salesforce-cicd.yml

name: Salesforce CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'force-app/**'
      - 'sfdx-project.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'force-app/**'
      - 'sfdx-project.json'

env:
  SALESFORCE_CLI_VERSION: 'latest'

jobs:
  # ==========================================
  # VALIDATION JOB - Runs on PRs
  # ==========================================
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for delta detection

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@${{ env.SALESFORCE_CLI_VERSION }}

      - name: Verify CLI Installation
        run: sf version

      - name: Authenticate to Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias target-org
          rm auth.txt

      - name: Validate Deployment (Check-only)
        run: |
          sf project deploy start \
            --target-org target-org \
            --dry-run \
            --test-level RunLocalTests \
            --wait 30

      - name: Run Code Scanner
        run: |
          sf plugins install @salesforce/sfdx-scanner
          sf scanner run --target "force-app" --format table --severity-threshold 2

  # ==========================================
  # TEST JOB - Runs on all pushes
  # ==========================================
  test:
    name: Run Apex Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@${{ env.SALESFORCE_CLI_VERSION }}

      - name: Authenticate to Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias target-org
          rm auth.txt

      - name: Run Apex Tests
        run: |
          sf apex run test \
            --target-org target-org \
            --test-level RunLocalTests \
            --code-coverage \
            --result-format human \
            --wait 30

  # ==========================================
  # DEPLOY JOB - Runs on merge to main
  # ==========================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@${{ env.SALESFORCE_CLI_VERSION }}

      - name: Authenticate to Production
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_PROD }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias prod-org
          rm auth.txt

      - name: Deploy to Production
        run: |
          sf project deploy start \
            --target-org prod-org \
            --test-level RunLocalTests \
            --wait 60

  # ==========================================
  # DELTA DEPLOY JOB - Alternative for large projects
  # ==========================================
  delta-deploy:
    name: Delta Deploy
    runs-on: ubuntu-latest
    if: false  # Enable by changing to true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI and Delta Plugin
        run: |
          npm install -g @salesforce/cli
          sf plugins install sfdx-git-delta

      - name: Authenticate
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias target-org
          rm auth.txt

      - name: Generate Delta Package
        run: |
          sf sgd source delta \
            --from "origin/main" \
            --to "HEAD" \
            --output "delta" \
            --generate-delta

      - name: Deploy Delta
        run: |
          if [ -f delta/package/package.xml ]; then
            sf project deploy start \
              --target-org target-org \
              --manifest delta/package/package.xml \
              --wait 30
          else
            echo "No changes detected"
          fi
